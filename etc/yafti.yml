---
title: Welcome to Goldenblue
properties:
  mode: "run-on-change"
  path: "~/.config/yafti/last-run"  # We can just rm this file if we want to force yafti to run
screens:
  first-screen:
    source: yafti.screen.title
    values:
      title: "Welcome to Goldenblue"
      icon: "/etc/yafti.svg"
      description: |
        Pick some applications to get started
  can-we-modify-your-flatpaks:
    source: yafti.screen.consent
    values:
      title: Welcome, Traveler
      condition:
        run: flatpak remotes --system | grep fedora
      description: |
        WARNING: This will modify your Flatpaks if you are rebasing! If you do not want to do this exit the installer.
      actions:
        - run: /usr/lib/fedora-third-party/fedora-third-party-opt-out
        - run: /usr/bin/fedora-third-party disable
        - run: flatpak remote-delete fedora --force
        - run: flatpak remove --system --noninteractive --all
        - run: flatpak remote-add --if-not-exists --user flathub https://flathub.org/repo/flathub.flatpakrepo
  applications:
    source: yafti.screen.package
    values:
      title: Application Installation
      show_terminal: true
      package_manager: yafti.plugin.flatpak
      package_manager_defaults:
        user: true
        system: false
      groups:
        Productivity:
          description: Core productivity apps
          default: true
          packages:
          - GitKraken:
                package: com.axosoft.GitKraken
                system: false
                user: true
          - Obfuscate:
                package: com.belmoussaoui.Obfuscate
                system: false
                user: true
          - Bitwarden:
                package: com.bitwarden.desktop
                system: false
                user: true
          - Tor Browser Launcher:
                package: com.github.micahflee.torbrowser-launcher
                system: false
                user: true
          - Microsoft Edge:
                package: com.microsoft.Edge
                system: false
                user: true
          - Blanket:
                package: com.rafaelmardojai.Blanket
                system: false
                user: true
          - Transmission:
                package: com.transmissionbt.Transmission
                system: false
                user: true
          - Visual Studio Code:
                package: com.visualstudio.code
                system: false
                user: true
          - Element:
                package: im.riot.Riot
                system: false
                user: true
          - mpv:
                package: io.mpv.Mpv
                system: false
                user: true
          - Obsidian:
                package: md.obsidian.Obsidian
                system: false
                user: true
          - Audacity:
                package: org.audacityteam.Audacity
                system: false
                user: true
          - GNU Image Manipulation Program:
                package: org.gimp.GIMP
                system: false
                user: true
          - gPodder:
                package: org.gpodder.gpodder
                system: false
                user: true
          - LibreOffice:
                package: org.libreoffice.LibreOffice
                system: false
                user: true
          - Raspberry Pi Imager:
                package: org.raspberrypi-rpi-imager
                system: false
                user: true
          - Stellarium:
                package: org.stellarium.Stellarium
                system: false
                user: true
          - ZAP:
                package: org.zaproxy.ZAP
                system: false
                user: true
          - Zotero:
                package: org.zotero.Zotero
                system: false
                user: true
        Games:
          description: Open source video game goodness
          default: true
          packages:
          - Sonic Robo Blast 2 Kart:
                package: org.srb2.SRB2Kart
                system: false
                user: true
          - SuperTuxKart:
                package: net.supertuxkart.SuperTuxKart
                system: false
                user: true

  final-screen:
    source: yafti.screen.title
    values:
      title: "All done!"
      icon: "/etc/yafti.svg"
      links:
        - "Install More Applications": 
            run: /usr/bin/foot
        - "Website":
            run: /usr/bin/xdg-open https://gitlab.com/alexhaydock/goldenblue
      description: |
        Thanks :)
...
