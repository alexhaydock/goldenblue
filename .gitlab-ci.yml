build:
  image: docker:latest
  stage: build
  variables:
    - FEDORA_MAJOR_VERSION: ":38"
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
    - docker build --pull -t "$CI_REGISTRY_IMAGE/os${FEDORA_MAJOR_VERSION}" .
    - docker push "$CI_REGISTRY_IMAGE/os${FEDORA_MAJOR_VERSION}"
